site_name: TOAST

theme:
  name: "material"
  logo: toast_logo_small.png
  favicon: toast_logo_small.png
  features:
    - navigation.expand
    - navigation.path

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_root_heading: true
            heading_level: 3
            parameter_headings: false
            show_object_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
  - mkdocs-jupyter:
      execute: False
      include_source: True

nav:
  - Introduction: index.md
  - Installation: install.md
  - Tutorials:
      - tutorials/index.md
      #- tutorials/interactive.ipynb
      - tutorials/data_model.ipynb
      #- tutorials/tod_ops.ipynb
      #- tutorials/mapmaking.ipynb
      #- tutorials/sim_instrument.ipynb
      #- tutorials/sim_sky.ipynb
  - Recipes:
      - recipes/index.md
      #- recipes/configuration.md
      #- recipes/experiments.md
      #- recipes/abstractions.md
  - Design:
      - design/overview.md
      - design/data_model.md
      - design/process_model.md
      - design/parallelism.md
      #- design/workflows.md
  - API Reference: reference.md
  - For Developers:
      - develop/index.md
      #- develop/layout.md
      #- develop/contributing.md
      #- develop/deployment.md

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
