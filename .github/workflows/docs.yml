name:  Documentation

on:
  workflow_dispatch:
  release:
    types: [ published ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: Configure pages
        uses: actions/configure-pages@v6

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Setup Conda Base
        run: |
          sudo rm -rf /usr/share/miniconda \
            && sudo rm -rf /usr/local/miniconda \
            && curl -SL -o miniforge.sh https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh \
            && bash miniforge.sh -b -f -p ~/conda \
            && source ~/conda/etc/profile.d/conda.sh \
            && conda activate base \
            && conda update -n base --yes conda

      - name: Check Conda Config
        run: |
          source ~/conda/etc/profile.d/conda.sh \
            && conda activate base \
            && conda info \
            && conda list \
            && conda config --show-sources \
            && conda config --show

      - name: Create Conda Env
        run: |
          source ~/conda/etc/profile.d/conda.sh \
            && conda activate base \
            && ./conda_setup.sh -e docs \

      - name: Install TOAST
        run: |
          source ~/conda/etc/profile.d/conda.sh \
            && conda activate docs \
            && pip install -v .

      - name: Install Doc Dependencies
        run: |
          source ~/conda/etc/profile.d/conda.sh \
            && conda activate docs \
            && pip install -r docs/doc_requirements.txt

      - name: Build Docs
        run: |
          source ~/conda/etc/profile.d/conda.sh \
            && conda activate docs \
            && pushd docs \
            && ./build.sh \
            && popd

      - name: Upload Docs
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/site

  deploy_docs:
    name: Deploy Documentation
    needs: build_docs
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
